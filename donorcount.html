<style>

    font-size: 50px;
    font-weight: 900;

    font-size: 30px;
    font-weight: 500;
}

    font-size: 30px;

    background-color: #ffffff;
	border-width: 1px;
    margin: 8px;

.button3 {
    background-color: #ffffff;
    border-width: 1px;

	padding-right: 15px;

    position: fixed;
	background-image:url('bg.png');

	justify-content: space-evenly;
	border-color: red;
	padding:5px;
	margin:5px

}

	padding-top:20px;

<body>
<div class="row" style="padding-left:5%;padding-top:2%;padding-right:5%;">
	<div class="col-md-6">
	
		<div class="row flex-column col-md-12 container">
		
			<div class="d-flex flex-row">
				<div class="logo-img" >
					<img src="vconstruct-logo.png" >
				</div>
				<div class="d-flex flex-row" style="padding-top:5%">
					<p id="timeleft" style="color:#004D86;font-size: 40px;font-weight: 750;">
    &nbsp;&nbsp;&nbsp;Event Ends In:&nbsp;
</p>
					<p id="demo" style="color:#004D86;font-size: 40px;font-weight: 750;"></p>
				</div>
			</div>
			<div class="card d-flex flex-column">
				<p class="align-self-center counter-text" style="font-family:Oswald;font-size: 40px">EVERYONE CAN BE <span style="color:red;font-weight:300">A HERO</span></p>
				<hr class="align-self-center" style="width:50%;border-top: 1px solid">
				<p class="align-self-center counter-text" style="color:red;font-family:Brush Script MT;font-size: 63px;" >Be a Donor</p>
			</div>
			<br />
			<div class="card d-flex flex-row">
			
				<div class="donors d-flex flex-column ">
					<p class="counter-text"># Donors</p>
					<p id="donarCount" class="counter-value d-flex justify-content-center">0</p>
				</div>
				
				<div class="donors d-flex flex-column">
					<p class="counter-text"># Lives Saved</p>
					<p id="SavedValue" class="counter-value d-flex justify-content-center">0</p>
				</div>

				
			</div>
			<br/>
		
			<p class="align-self-center slogon-text" style="font-family:Trebuchet MS"> 10th Jun 2026</p>
		
			<div >
			
				<div>
					<!-- <button onClick="onReset()" class="button1">R</button> -->
					<button onClick=" onDecrement()" class=" btn btn-danger"/> </button> &nbsp;
					<button onClick="onIncrement()" class="btn btn-success"></button>
					
					
					
				</div>
				
			</div>
			
		
		</div>

	</div>
	
	<div class="col-md-6">
		<img src = "Donor.jpg" alt = "donor img" class="donor-img">
	</div>
	
</div>

<script>
	let donarElement = document.getElementById("donarCount");
	let saveCount = document.getElementById("SavedValue");

	function onIncrement() {
		let previousdonarCount = donarElement.textContent;
		let updateddonarCount = parseInt(previousdonarCount) + 1;
		let updatedSaveLives = parseInt(updateddonarCount) * 3;
		donarElement.style.color = "red";
		saveCount.style.color = "red"
		donarElement.textContent = updateddonarCount;
		saveCount.textContent = updatedSaveLives;
	}
	
	function onDecrement() {
		let previousdonarCount = donarElement.textContent;
		let updateddonarCount = parseInt(previousdonarCount) - 1;
		let updatedSaveLives = parseInt(updateddonarCount) * 3;
		donarElement.style.color = "red";
		saveCount.style.color = "red"
		donarElement.textContent = updateddonarCount;
		saveCount.textContent = updatedSaveLives;
	}

	function onIncrementby5() {
		let previousdonarCount = donarElement.textContent;
		let updateddonarCount = parseInt(previousdonarCount) + 5;
		let updatedSaveLives = parseInt(updateddonarCount) * 3;
		donarElement.textContent = updateddonarCount;
		donarElement.style.color = "red";
		saveCount.style.color = "red"
		saveCount.textContent = updatedSaveLives;
	}

	function onReset() {
		let donarCount = 0;
		let savedValue = 0;
		donarElement.textContent = donarCount;
		saveCount.textContent = savedValue;
		donarElement.style.color = "black";
		saveCount.style.color = "black"
	}
	
	// Set the date we're counting down to
	var countDownDate = new Date("Jun 10, 2026 20:25:00").getTime();
	//var countDownDate = new Date("Feb 13, 2020 12:30:00").getTime();
	// Update the count down every 1 second
	var x = setInterval(function() {



	// Get today's date and time
	var now = new Date().getTime();

	// Find the distance between now and the count down date
	var distance = countDownDate - now;

	// Time calculations for days, hours, minutes and seconds
	var days = Math.floor(distance / (1000 * 60 * 60 * 24));
	var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
	var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
	var seconds = Math.floor((distance % (1000 * 60)) / 1000);

	// Output the result in an element with id="demo"
	document.getElementById("demo").innerHTML =
 days + "d " +
hours + "h " +
minutes + "m " +
seconds + "s";
	// If the count down is over, write some text
	if (distance < 0) {
    clearInterval(x);
    document.getElementById("timeleft").innerHTML = "";
    document.getElementById("demo").innerHTML = "Thank You.";
}
	if (days < 0 && hours<0&&minutes<0 && seconds <0) {
	clearInterval(x);
	document.getElementById("timeleft").innerHTML = "";
	document.getElementById("demo").innerHTML = "Thank You.";
	}
	}, 1000);
</script>

</body>
